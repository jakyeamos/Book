<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Digital Book</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="chapter-controls">
    <button id="prev-chapter" class="hidden" aria-label="Previous chapter">Prev</button>
    <select id="chapter-selector" aria-label="Chapter selector"></select>
    <button id="next-chapter" aria-label="Next chapter">Next</button>
    <button id="dark-mode-toggle" aria-label="Toggle dark mode">Dark</button>
    <button id="mute-toggle" aria-label="Mute audio">Mute</button>
    <button id="effects-toggle" aria-label="Toggle visual effects">Effects On</button>
    <button id="highlight-text-button">Highlight</button>
</div>

<audio id="background-audio" preload="auto"></audio>
<audio id="background-audio-secondary" preload="auto"></audio>
<audio id="ambient-audio" preload="auto" loop></audio>

<div id="particles-container" aria-hidden="true"></div>

<div id="audio-unlock-prompt" class="hidden" role="status" aria-live="polite">
    <p>Audio is paused by your browser. Tap to enable chapter sound.</p>
    <button id="audio-unlock-button" type="button">Enable Audio</button>
</div>

<div class="book-container chapter-theme" data-chapter="chapter1">
    <div id="parallax-root" aria-hidden="true"></div>

    <div id="chapter-container">
        <!-- Chapter content is injected dynamically by script.js.
             Development note: fetch() requires an HTTP server. file:// protocol will not load chapter fragments. -->
    </div>

    <div id="book-content">
        <p>Select text to highlight it.</p>
    </div>

    <div class="comments">
        <h2>Discussion</h2>
        <div id="giscus-container"></div>
        <p id="giscus-placeholder" class="giscus-placeholder hidden">Giscus not configured - edit chapters/config.js to enable comments.</p>
    </div>

    <div class="chapter-footer">
        <span id="page-number">Page 1</span> | <span id="chapter-footer">Loading chapter...</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha384-HOvlOYPIs/zjoIkWUGXkVmXsjr8GuZLV+Q+rcPwmJOVZVpvTSXQChiN4t9Euv9Vc" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" integrity="sha384-P8VzCVnT9NBUkMrpcIZrJbA7EBjJvh/fJS6PmP+4nLIM284DtsImIv8D0fFjIkeh" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles-slim/2.12.0/tsparticles.slim.bundle.min.js" integrity="sha384-xICYS6rIsARSX3k0YKfjEX+OFPqH6c1BHFyDy/Qu4MKRcQT39ngsWhuBOhoRcQl/" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script type="module" src="script.js"></script>
</body>
</html>
